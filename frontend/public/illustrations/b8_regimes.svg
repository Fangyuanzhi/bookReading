<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- staircase descent from timocracy to tyranny -->
  <g fill="#5b4636" opacity="0.12">
    <rect x="100" y="110" width="130" height="40"/>
    <rect x="230" y="150" width="130" height="40"/>
    <rect x="360" y="190" width="130" height="40"/>
    <rect x="490" y="230" width="130" height="40"/>
  </g>
  <!-- regime icons -->
  <g fill="none" stroke="#5b4636" stroke-width="2" opacity="0.75">
    <circle cx="165" cy="90" r="22"/> <!-- honor/sparta -->
    <rect x="275" y="75" width="40" height="30"/> <!-- oligarchy wealth -->
    <path d="M425 65 L445 105 L405 105 Z"/> <!-- democracy many-headed -->
    <path d="M555 90 L585 90 L570 60 Z"/> <!-- tyranny beast -->
  </g>
  <!-- descent arrow -->
  <defs><marker id="down" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0 L5 10 L10 0 z" fill="#a0522d"/></marker></defs>
  <line x1="150" y1="180" x2="600" y2="320" stroke="#a0522d" stroke-width="2" fill="none" opacity="0.55" marker-end="url(#down)"/>
  <!-- labels -->
  <text x="165" y="140" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="11" fill="#5b4636">荣誉政体</text>
  <text x="295" y="180" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="11" fill="#5b4636">寡头政体</text>
  <text x="425" y="220" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="11" fill="#5b4636">民主政体</text>
  <text x="555" y="260" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="11" fill="#5b4636">僭主政体</text>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.75">第八卷：四种政体的堕落阶梯</text>
</svg>