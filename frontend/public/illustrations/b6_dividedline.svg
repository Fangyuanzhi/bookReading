<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- large divided line -->
  <line x1="100" y1="260" x2="700" y2="260" stroke="#5b4636" stroke-width="3"/>
  <line x1="400" y1="250" x2="400" y2="270" stroke="#5b4636" stroke-width="3"/>
  <!-- ascending arrow -->
  <defs><marker id="up" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 10 L5 0 L10 10 z" fill="#b8860b"/></marker></defs>
  <line x1="120" y1="320" x2="680" y2="120" stroke="#b8860b" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#up)"/>
  <!-- sun of the good -->
  <circle cx="680" cy="120" r="45" fill="#e0a24e" opacity="0.18"/>
  <circle cx="680" cy="120" r="25" fill="#e0a24e" opacity="0.35"/>
  <g stroke="#b8860b" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="680" y1="50" x2="680" y2="75"/>
    <line x1="680" y1="165" x2="680" y2="190"/>
    <line x1="610" y1="120" x2="635" y2="120"/>
    <line x1="725" y1="120" x2="750" y2="120"/>
  </g>
  <!-- labels -->
  <text x="250" y="290" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="12" fill="#5b4636" opacity="0.8">可见世界 · 意见</text>
  <text x="550" y="290" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="12" fill="#5b4636" opacity="0.8">可知世界 · 知识</text>
  <text x="680" y="90" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="13" fill="#b8860b">善</text>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.75">第六卷：线段喻与作为最高原则的善</text>
</svg>