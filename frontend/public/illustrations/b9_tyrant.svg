<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- three figures representing three lives -->
  <g fill="#3b332b" opacity="0.85">
    <!-- philosopher / just -->
    <circle cx="220" cy="180" r="14"/><rect x="208" y="196" width="24" height="48" rx="6"/>
    <path d="M206 170 Q220 150 234 170" fill="none" stroke="#3b332b" stroke-width="2"/>
    <!-- oligarchic / honor -->
    <circle cx="400" cy="180" r="14"/><rect x="388" y="196" width="24" height="48" rx="6"/>
    <!-- tyrannical -->
    <circle cx="580" cy="180" r="14"/><rect x="568" y="196" width="24" height="48" rx="6"/>
    <!-- beast shadow behind tyrant -->
    <path d="M620 160 Q660 140 670 190 Q650 230 610 210 Q590 240 560 210" fill="#a0522d" opacity="0.15"/>
  </g>
  <!-- pleasure balance -->
  <g transform="translate(400,280)" opacity="0.8">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#5b4636" stroke-width="2"/>
    <line x1="-120" y1="30" x2="120" y2="30" stroke="#5b4636" stroke-width="2"/>
    <circle cx="-100" cy="30" r="16" fill="#b8860b" opacity="0.3"/>
    <circle cx="0" cy="30" r="16" fill="#b8860b" opacity="0.3"/>
    <circle cx="100" cy="30" r="16" fill="#b8860b" opacity="0.3"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.75">第九卷：僭主式灵魂与三种人生的快乐之辨</text>
</svg>