<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- acropolis -->
  <g fill="#5b4636" opacity="0.15">
    <rect x="320" y="130" width="160" height="120"/>
    <polygon points="300,130 400,70 500,130"/>
  </g>
  <!-- male & female guardians with helms -->
  <g fill="#3b332b">
    <circle cx="300" cy="220" r="14"/><rect x="288" y="236" width="24" height="50" rx="6"/>
    <path d="M286 210 Q300 190 314 210" fill="none" stroke="#3b332b" stroke-width="3"/>
    <circle cx="500" cy="220" r="14"/><rect x="488" y="236" width="24" height="50" rx="6"/>
    <path d="M486 210 Q500 190 514 210" fill="none" stroke="#3b332b" stroke-width="3"/>
  </g>
  <!-- children/community -->
  <g fill="#8b6f47" opacity="0.7">
    <circle cx="360" cy="270" r="8"/><rect x="354" y="280" width="12" height="22" rx="3"/>
    <circle cx="400" cy="270" r="8"/><rect x="394" y="280" width="12" height="22" rx="3"/>
    <circle cx="440" cy="270" r="8"/><rect x="434" y="280" width="12" height="22" rx="3"/>
  </g>
  <!-- shared upbringing arrows -->
  <g stroke="#b8860b" stroke-width="1.5" fill="none" opacity="0.45">
    <line x1="300" y1="250" x2="360" y2="265"/>
    <line x1="500" y1="250" x2="440" y2="265"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.75">第五卷：女护卫者、共有子女与哲人王</text>
</svg>