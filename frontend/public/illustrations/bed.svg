<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- three levels of bed -->
  <g stroke="#5b4636" stroke-width="2" fill="none" opacity="0.9">
    <rect x="100" y="220" width="160" height="70" rx="6"/>
    <line x1="110" y1="290" x2="110" y2="330"/><line x1="250" y1="290" x2="250" y2="330"/>
  </g>
  <g stroke="#8b6f47" stroke-width="2" fill="none" opacity="0.75">
    <rect x="320" y="230" width="160" height="60" rx="6"/>
    <line x1="330" y1="290" x2="330" y2="325"/><line x1="470" y1="290" x2="470" y2="325"/>
  </g>
  <g stroke="#b8860b" stroke-width="2" fill="none" opacity="0.6">
    <rect x="540" y="240" width="160" height="50" rx="6"/>
    <line x1="550" y1="290" x2="550" y2="320"/><line x1="690" y1="290" x2="690" y2="320"/>
  </g>
  <!-- labels -->
  <text x="180" y="180" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="15" fill="#3b332b">理念之床</text>
  <text x="400" y="195" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="15" fill="#3b332b">工匠之床</text>
  <text x="620" y="210" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="15" fill="#3b332b">画家之床</text>
  <!-- descending truth arrows -->
  <g stroke="#b8860b" stroke-width="1.5" opacity="0.5" marker-end="url(#a)">
    <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#b8860b"/></marker></defs>
    <line x1="260" y1="150" x2="320" y2="170"/>
    <line x1="480" y1="160" x2="540" y2="180"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.7">床喻：理念、实物与模仿的三层距离</text>
</svg>