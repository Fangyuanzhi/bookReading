<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- human soul silhouette divided into three -->
  <g transform="translate(400,190)">
    <circle cx="0" cy="-70" r="45" fill="none" stroke="#5b4636" stroke-width="2.5" opacity="0.7"/>
    <path d="M-40 -25 Q0 -60 40 -25 L35 110 Q0 130 -35 110 Z" fill="none" stroke="#5b4636" stroke-width="2.5" opacity="0.7"/>
    <line x1="0" y1="-25" x2="0" y2="110" stroke="#5b4636" stroke-width="1.5" opacity="0.5"/>
    <line x1="-38" y1="20" x2="38" y2="20" stroke="#5b4636" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- labels -->
  <text x="400" y="60" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#b8860b">理性 · 智慧</text>
  <text x="270" y="230" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#b8860b">意气 · 勇敢</text>
  <text x="530" y="230" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#b8860b">欲望 · 节制</text>
  <!-- scales of justice -->
  <g transform="translate(680,120)" opacity="0.8">
    <line x1="0" y1="0" x2="0" y2="100" stroke="#5b4636" stroke-width="3"/>
    <line x1="-50" y1="40" x2="50" y2="40" stroke="#5b4636" stroke-width="2"/>
    <path d="M-60 40 Q-50 70 -30 70 Q-10 70 0 40" fill="none" stroke="#5b4636" stroke-width="1.5"/>
    <path d="M60 40 Q50 70 30 70 Q10 70 0 40" fill="none" stroke="#5b4636" stroke-width="1.5"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.75">第四卷：城邦与灵魂的四德——智慧、勇敢、节制、正义</text>
</svg>