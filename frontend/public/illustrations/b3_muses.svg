<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- lyre / kithara -->
  <g transform="translate(180,80)" opacity="0.85">
    <path d="M60 180 C20 180 10 120 40 80 C30 50 30 30 40 10 C45 25 55 25 60 10 C65 25 75 25 80 10 C90 30 90 50 80 80 C110 120 100 180 60 180 Z" fill="none" stroke="#5b4636" stroke-width="2.5"/>
    <line x1="60" y1="20" x2="60" y2="160" stroke="#5b4636" stroke-width="2"/>
    <line x1="42" y1="90" x2="78" y2="90" stroke="#5b4636" stroke-width="1.5"/>
    <line x1="38" y1="115" x2="82" y2="115" stroke="#5b4636" stroke-width="1.5"/>
    <line x1="42" y1="140" x2="78" y2="140" stroke="#5b4636" stroke-width="1.5"/>
  </g>
  <!-- scrolls / censorship -->
  <g fill="#e8ddcd" stroke="#8b7355" stroke-width="2">
    <rect x="420" y="100" width="80" height="120" rx="4"/>
    <line x1="435" y1="125" x2="485" y2="125" stroke="#8b7355" stroke-width="1.5"/>
    <line x1="435" y1="145" x2="485" y2="145" stroke="#8b7355" stroke-width="1.5"/>
    <line x1="435" y1="165" x2="485" y2="165" stroke="#8b7355" stroke-width="1.5"/>
    <rect x="520" y="110" width="70" height="100" rx="4"/>
    <line x1="535" y1="135" x2="575" y2="135" stroke="#8b7355" stroke-width="1.5"/>
    <line x1="535" y1="155" x2="575" y2="155" stroke="#8b7355" stroke-width="1.5"/>
  </g>
  <!-- forbidden cross -->
  <g stroke="#a0522d" stroke-width="3" opacity="0.6">
    <line x1="450" y1="250" x2="560" y2="330"/>
    <line x1="560" y1="250" x2="450" y2="330"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.75">第三卷：缪斯教育、诗艺审查与高贵的谎言</text>
</svg>