<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- port / sea -->
  <path d="M0 260 Q200 240 400 260 T800 260 L800 400 L0 400 Z" fill="#8ab4c4" opacity="0.25"/>
  <path d="M0 290 Q200 270 400 290 T800 290" fill="none" stroke="#6b9aaa" stroke-width="2" opacity="0.4"/>
  <!-- building / temple silhouette -->
  <rect x="60" y="160" width="120" height="110" fill="#5b4636" opacity="0.15"/>
  <path d="M50 160 L120 110 L190 160 Z" fill="#5b4636" opacity="0.2"/>
  <!-- five figures in dialogue -->
  <g fill="#3b332b">
    <circle cx="280" cy="220" r="14"/><rect x="268" y="236" width="24" height="46" rx="6"/>
    <circle cx="340" cy="200" r="13"/><rect x="329" y="215" width="22" height="42" rx="5"/>
    <circle cx="400" cy="220" r="15"/><rect x="386" y="238" width="28" height="50" rx="6"/>
    <circle cx="470" cy="205" r="13"/><rect x="459" y="220" width="22" height="42" rx="5"/>
    <circle cx="540" cy="225" r="14"/><rect x="528" y="241" width="24" height="46" rx="6"/>
  </g>
  <!-- speech bubbles / dialectic arcs -->
  <g fill="none" stroke="#b8860b" stroke-width="1.5" opacity="0.6">
    <path d="M295 200 Q320 170 360 185"/>
    <path d="M430 180 Q460 160 500 185"/>
    <path d="M515 205 Q550 180 590 200"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.75">第一卷：在比雷埃夫斯，众人争论「何为正义」</text>
</svg>