<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- three classes as concentric city -->
  <g fill="none" stroke="#5b4636" stroke-width="2" opacity="0.85">
    <rect x="120" y="160" width="560" height="140"/>
    <rect x="200" y="120" width="400" height="180"/>
    <rect x="300" y="80" width="200" height="220"/>
  </g>
  <!-- acropolis / philosopher king -->
  <g fill="#3b332b">
    <rect x="340" y="40" width="120" height="60" rx="4"/>
    <polygon points="340,40 400,10 460,40" fill="#3b332b"/>
  </g>
  <text x="400" y="80" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="12" fill="#f4ecd8">理性</text>
  <text x="400" y="160" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="13" fill="#3b332b">护卫者</text>
  <text x="400" y="220" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="13" fill="#3b332b">生产者</text>
  <text x="400" y="350" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="13" fill="#3b332b">城邦三分：智慧、勇敢、节制各安其位</text>
</svg>