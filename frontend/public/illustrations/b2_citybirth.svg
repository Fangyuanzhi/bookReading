<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4ecd8"/>
  <!-- concentric city rings -->
  <g fill="none" stroke="#5b4636" stroke-width="2" opacity="0.35">
    <circle cx="400" cy="220" r="150"/>
    <circle cx="400" cy="220" r="110"/>
    <circle cx="400" cy="220" r="70"/>
  </g>
  <!-- houses / workshops -->
  <g fill="#8b7355" opacity="0.25">
    <rect x="250" y="200" width="28" height="22"/><polygon points="249,200 264,185 279,200"/>
    <rect x="530" y="190" width="28" height="22"/><polygon points="529,190 544,175 559,190"/>
    <rect x="385" y="300" width="30" height="22"/><polygon points="384,300 400,285 416,300"/>
  </g>
  <!-- farmer, builder, weaver -->
  <g fill="#3b332b">
    <circle cx="210" cy="220" r="12"/><rect x="200" y="234" width="20" height="38" rx="5"/>
    <line x1="210" y1="245" x2="180" y2="260" stroke="#3b332b" stroke-width="3" stroke-linecap="round"/>
    <circle cx="600" cy="220" r="12"/><rect x="590" y="234" width="20" height="38" rx="5"/>
    <circle cx="400" cy="140" r="12"/><rect x="390" y="154" width="20" height="38" rx="5"/>
  </g>
  <!-- trade arrows -->
  <g stroke="#b8860b" stroke-width="1.5" fill="none" opacity="0.55" marker-end="url(#ar)">
    <defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#b8860b"/></marker></defs>
    <path d="M230 220 Q300 180 380 160"/>
    <path d="M410 160 Q480 180 580 220"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,'Noto Serif SC',serif" font-size="14" fill="#5b4636" opacity="0.75">第二卷：城邦的起源——分工、互助与需求</text>
</svg>