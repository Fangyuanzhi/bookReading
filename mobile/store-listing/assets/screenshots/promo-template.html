<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>陪读 · 应用宝宣传图 1080×540</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 540px;
      overflow: hidden;
      font-family: "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563EB 55%, #3b82f6 100%);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 72px;
      gap: 64px;
    }
    .icon {
      width: 160px;
      height: 160px;
      border-radius: 36px;
      background: linear-gradient(145deg, #1e3a5f, #2563EB);
      box-shadow: 0 24px 48px rgba(0,0,0,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon svg { width: 96px; height: 96px; }
    .copy { flex: 1; }
    .brand {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: 36px;
      font-weight: 500;
      opacity: 0.95;
      line-height: 1.4;
      margin-bottom: 24px;
    }
    .bullets {
      font-size: 22px;
      opacity: 0.85;
      line-height: 1.8;
    }
    .glow {
      position: absolute;
      right: -80px;
      top: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(251,191,36,.25) 0%, transparent 70%);
      pointer-events: none;
    }
    body { position: relative; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="icon">
    <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <path fill="#F5E6D3" d="M312 340c0-24 20-44 52-44h116v472H364c-32 0-52-20-52-44V340zm284 0v384c0 24 20 44 52 44h116V296H648c-32 0-52 20-52 44z"/>
      <circle cx="248" cy="520" r="36" fill="#FBBF24" opacity=".9"/>
      <circle cx="776" cy="520" r="36" fill="#FBBF24" opacity=".9"/>
    </svg>
  </div>
  <div class="copy">
    <div class="brand">陪读</div>
    <div class="tagline">不是一个人在读</div>
    <div class="bullets">
      段评浮现在原句旁 · 结伴开关 · 氛围阅读 · 共读小组
    </div>
  </div>
</body>
</html>
