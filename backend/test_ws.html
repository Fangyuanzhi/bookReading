<!DOCTYPE html>
<html>
<head>
    <title>陪读实时推送测试</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .log { background: #f5f5f5; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .log-item { margin: 5px 0; padding: 5px; border-left: 3px solid #007bff; padding-left: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .connected { color: green; }
        .disconnected { color: red; }
    </style>
</head>
<body>
    <h1>陪读实时推送测试</h1>
    
    <div>
        <h3>API 测试</h3>
        <button onclick="testAPI()">测试 API 连接</button>
        <button onclick="testAuth()">测试登录</button>
        <button onclick="testCreateNote()">创建段评</button>
    </div>

    <div>
        <h3>WebSocket 测试</h3>
        <p>状态: <span id="ws-status" class="disconnected">未连接</span></p>
        <button onclick="connectWS()">连接 WebSocket</button>
        <button onclick="disconnectWS()">断开</button>
    </div>

    <div class="log">
        <h3>日志</h3>
        <div id="logs"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';
        let token = '';
        let ws = null;

        function log(msg) {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('logs').prepend(div);
        }

        async function testAPI() {
            try {
                const res = await fetch(`${API_BASE}/books`);
                const data = await res.json();
                log(`API 测试成功: ${data.data.books.length} 本书`);
            } catch (err) {
                log(`API 测试失败: ${err.message}`);
            }
        }

        async function testAuth() {
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: '123456'
                    })
                });
                const data = await res.json();
                if (data.data?.token) {
                    token = data.data.token;
                    log(`登录成功: ${data.data.user.display_name}`);
                } else {
                    log(`登录失败: ${data.message}`);
                }
            } catch (err) {
                log(`登录错误: ${err.message}`);
            }
        }

        async function testCreateNote() {
            if (!token) {
                log('请先登录');
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/notes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        book_id: '3e1f76eb-cf89-4ecf-a576-821673fe37c8',
                        chapter_id: '11cec2b5-6227-4f46-ad77-d819220772cc',
                        cfi: 'epubcfi(/6/2[id4]!/4/2)',
                        text_quote: '测试文本',
                        body: '这是一条测试段评',
                        is_public: true
                    })
                });
                const data = await res.json();
                log(`创建段评: ${data.message}`);
            } catch (err) {
                log(`创建失败: ${err.message}`);
            }
        }

        function connectWS() {
            if (ws) {
                log('已经连接');
                return;
            }
            
            // 尝试连接 Centrifugo
            ws = new WebSocket('ws://localhost:8000/connection/websocket');
            
            ws.onopen = () => {
                document.getElementById('ws-status').textContent = '已连接';
                document.getElementById('ws-status').className = 'connected';
                log('WebSocket 已连接');
                
                // 发送连接请求
                ws.send(JSON.stringify({
                    connect: { token: token || '' }
                }));
                
                // 订阅章节频道
                setTimeout(() => {
                    ws.send(JSON.stringify({
                        subscribe: { channel: 'chapter:11cec2b5-6227-4f46-ad77-d819220772cc' }
                    }));
                    log('已订阅章节频道');
                }, 1000);
            };
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                log(`收到消息: ${JSON.stringify(data).slice(0, 200)}`);
            };
            
            ws.onclose = () => {
                document.getElementById('ws-status').textContent = '已断开';
                document.getElementById('ws-status').className = 'disconnected';
                log('WebSocket 已断开');
                ws = null;
            };
            
            ws.onerror = (err) => {
                log(`WebSocket 错误: ${err.message || '连接失败'}`);
            };
        }

        function disconnectWS() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        // 页面加载时自动测试 API
        window.onload = () => {
            log('页面加载完成，点击按钮开始测试');
        };
    </script>
</body>
</html>
