app:
  name: "陪读后端"
  version: "0.1.0"
  port: 8080
  mode: "debug" # debug/release

jwt:
  secret: "your-secret-key-change-in-production"
  expire_hours: 168 # 7 days

log:
  level: "debug" # debug/info/warn/error
  format: "console" # json/console（stdout 控制台格式）
  file: "../logs/backend.log" # 结构化 JSON 写入项目 logs 目录

database:
  host: "localhost"
  port: 5432
  user: "peidu"
  password: "peidu123"
  dbname: "peidu"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

minio:
  endpoint: "localhost:9000"
  access_key: "peidu"
  secret_key: "peidu123456"
  use_ssl: false
  bucket: "bookreading"

centrifugo:
  api_url: "http://localhost:8000/api"
  api_key: "demo-api-key"
  ws_url: "ws://localhost:8000/connection/websocket"

rate_limit:
  requests_per_second: 10
  burst: 20